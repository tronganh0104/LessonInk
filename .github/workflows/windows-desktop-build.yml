name: Windows Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
      - dev

jobs:
  build-windows:
    name: Build Tauri Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Build Windows desktop app
        run: npx tauri build

      - name: Upload Windows desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mushroomlearning-windows-desktop
          path: |
            src-tauri/target/release/bundle/**/*
          if-no-files-found: error
